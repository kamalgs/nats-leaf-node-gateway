<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATS Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
         background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex;
         flex-direction: column; }
  #connect-form { padding: 20px; background: #16213e; display: flex; gap: 10px;
                  align-items: center; flex-wrap: wrap; }
  #connect-form label { font-size: 13px; color: #8888aa; }
  #connect-form input { background: #0f3460; border: 1px solid #333; color: #e0e0e0;
                         padding: 6px 10px; border-radius: 4px; font-size: 14px; }
  #connect-form input:focus { outline: none; border-color: #e94560; }
  #connect-form button { background: #e94560; color: white; border: none; padding: 6px 16px;
                          border-radius: 4px; cursor: pointer; font-size: 14px; }
  #connect-form button:hover { background: #c73652; }
  #status { font-size: 12px; padding: 4px 10px; border-radius: 10px; }
  .status-connected { background: #1b4332; color: #52b788; }
  .status-disconnected { background: #3d0000; color: #e94560; }
  .status-reconnecting { background: #3d3400; color: #f0c040; }
  #messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex;
              flex-direction: column; gap: 2px; }
  .msg { font-size: 14px; line-height: 1.5; }
  .msg .ts { color: #555; }
  .msg .user { font-weight: bold; }
  .msg.system { color: #888; font-style: italic; }
  #input-bar { display: flex; padding: 10px; background: #16213e; gap: 8px; }
  #input-bar input { flex: 1; background: #0f3460; border: 1px solid #333; color: #e0e0e0;
                     padding: 8px 12px; border-radius: 4px; font-size: 14px; }
  #input-bar input:focus { outline: none; border-color: #e94560; }
  #input-bar button { background: #e94560; color: white; border: none; padding: 8px 20px;
                      border-radius: 4px; cursor: pointer; font-size: 14px; }
  #input-bar button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<div id="connect-form">
  <label>Server<br><input id="url" value="wss://nats.gkamal.online" size="24"></label>
  <label>Username<br><input id="username" value="" placeholder="alice" size="12"></label>
  <label>Channel<br><input id="channel" value="general" size="12"></label>
  <button id="connect-btn">Connect</button>
  <span id="status" class="status-disconnected">disconnected</span>
</div>

<div id="messages"></div>

<div id="input-bar">
  <input id="msg-input" placeholder="Type a message..." disabled>
  <button id="send-btn" disabled>Send</button>
</div>

<script type="module">
  import { connect, StringCodec } from "https://cdn.jsdelivr.net/npm/nats.ws/+esm";

  const sc = StringCodec();
  const messagesEl = document.getElementById("messages");
  const msgInput = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const connectBtn = document.getElementById("connect-btn");
  const statusEl = document.getElementById("status");
  const urlInput = document.getElementById("url");
  const usernameInput = document.getElementById("username");
  const channelInput = document.getElementById("channel");

  let nc = null;
  let sub = null;

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls;
  }

  function addMessage(html, isSystem) {
    const div = document.createElement("div");
    div.className = isSystem ? "msg system" : "msg";
    div.innerHTML = html;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function fmtTime(ts) {
    const d = new Date(ts);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  }

  function userColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return `hsl(${h % 360}, 70%, 65%)`;
  }

  connectBtn.addEventListener("click", doConnect);

  async function doConnect() {
    const wsUrl = urlInput.value.trim();
    const username = usernameInput.value.trim() || "anon";
    const channel = channelInput.value.trim() || "general";
    const subject = `chat.${channel}`;

    if (nc) {
      await nc.drain();
      nc = null;
    }

    connectBtn.disabled = true;
    connectBtn.textContent = "Connecting...";
    setStatus("connecting...", "status-reconnecting");

    try {
      nc = await connect({ servers: wsUrl });
    } catch (e) {
      addMessage(`Failed to connect: ${e.message}`, true);
      setStatus("disconnected", "status-disconnected");
      connectBtn.disabled = false;
      connectBtn.textContent = "Connect";
      return;
    }

    setStatus("connected", "status-connected");
    connectBtn.textContent = "Reconnect";
    connectBtn.disabled = false;
    msgInput.disabled = false;
    sendBtn.disabled = false;
    addMessage(`Joined #${channel} as <span class="user" style="color:${userColor(username)}">${username}</span>`, true);

    // Status events
    (async () => {
      for await (const s of nc.status()) {
        if (s.type === "disconnect") setStatus("disconnected", "status-disconnected");
        else if (s.type === "reconnect") setStatus("connected", "status-connected");
        else if (s.type === "reconnecting") setStatus("reconnecting...", "status-reconnecting");
      }
    })();

    // Subscribe
    sub = nc.subscribe(subject);
    (async () => {
      for await (const msg of sub) {
        try {
          const data = JSON.parse(sc.decode(msg.data));
          const time = fmtTime(data.ts);
          const color = userColor(data.user);
          addMessage(`<span class="ts">[${time}]</span> <span class="user" style="color:${color}">${data.user}</span>: ${escapeHtml(data.text)}`);
        } catch (_) { /* ignore malformed */ }
      }
    })();

    // Send handler
    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      const payload = JSON.stringify({ user: username, text, ts: Date.now() });
      nc.publish(subject, sc.encode(payload));
      msgInput.value = "";
      msgInput.focus();
    }

    sendBtn.onclick = sendMessage;
    msgInput.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };

    // Handle connection close
    nc.closed().then(() => {
      setStatus("disconnected", "status-disconnected");
      msgInput.disabled = true;
      sendBtn.disabled = true;
    });
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
</script>

</body>
</html>
